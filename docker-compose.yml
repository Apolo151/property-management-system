# Run from repository root. For hot reload, set COMPOSE_FILE in .env — see .env.example
# Profiles: workers (QloApps workers), infra (optional QloApps container), tools (migrate/seed)

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3000
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-hotel_pms_dev}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - JWT_SECRET=${JWT_SECRET:-dev_secret_key}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672}
      - SYNC_INTERVAL_MS=${SYNC_INTERVAL_MS:-60000}
      - SYNC_ENABLED=${SYNC_ENABLED:-true}
      - QLOAPPS_DEFAULT_CURRENCY=${QLOAPPS_DEFAULT_CURRENCY:-EGP}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      rabbitmq:
        condition: service_healthy
        required: false
    restart: unless-stopped
    networks:
      - hotel-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:3000/api}
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - hotel-network

  worker-inbound:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: npm run worker:qloapps-inbound
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-hotel_pms_dev}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672}
      - QLOAPPS_DEFAULT_CURRENCY=${QLOAPPS_DEFAULT_CURRENCY:-EGP}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      rabbitmq:
        condition: service_healthy
        required: false
    restart: unless-stopped
    profiles:
      - workers
    networks:
      - hotel-network

  worker-outbound:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: npm run worker:qloapps-outbound
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-hotel_pms_dev}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672}
      - QLOAPPS_DEFAULT_CURRENCY=${QLOAPPS_DEFAULT_CURRENCY:-EGP}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      rabbitmq:
        condition: service_healthy
        required: false
    restart: unless-stopped
    profiles:
      - workers
    networks:
      - hotel-network

  worker-scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: npm run worker:qloapps-scheduler
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-hotel_pms_dev}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672}
      - QLOAPPS_DEFAULT_CURRENCY=${QLOAPPS_DEFAULT_CURRENCY:-EGP}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - QLOAPPS_SYNC_INTERVAL_MS=${QLOAPPS_SYNC_INTERVAL_MS:-300000}
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      rabbitmq:
        condition: service_healthy
        required: false
    restart: unless-stopped
    profiles:
      - workers
    networks:
      - hotel-network

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-hotel_pms_dev}
    ports:
      # Host port only — keep DB_PORT=5432 inside the stack for api → postgres DNS
      - "${HOST_DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-hotel_pms_dev}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hotel-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - hotel-network

  qloapps:
    image: webkul/qloapps_docker:latest
    container_name: qloapps
    ports:
      - "${QLOAPPS_PORT:-8080}:80"
      - "3306:3306"
      - "2222:22"
    environment:
      - USER_PASSWORD=${QLOAPPS_USER_PASSWORD:-qloappsuserpassword}
      - MYSQL_ROOT_PASSWORD=${QLOAPPS_MYSQL_ROOT_PASSWORD:-myrootpassword}
      - MYSQL_DATABASE=${QLOAPPS_MYSQL_DATABASE:-qlo170}
    restart: unless-stopped
    profiles:
      - infra
    networks:
      - hotel-network

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: npm run db:migrate
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-hotel_pms_dev}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools
    networks:
      - hotel-network

  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: npm run db:seed
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-hotel_pms_dev}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools
    networks:
      - hotel-network

volumes:
  postgres_data:
  rabbitmq_data:
  backend_node_modules:
  frontend_node_modules:

networks:
  hotel-network:
    driver: bridge
