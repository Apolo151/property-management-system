# Hot-reload bind mounts for local development.
# Use together with docker-compose.yml (see root .env.example: COMPOSE_FILE).

services:
  api:
    ports:
      - "${PORT:-8000}:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules

  frontend:
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  worker-inbound:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules

  worker-outbound:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules

  worker-scheduler:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules

