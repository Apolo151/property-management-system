# Production-like overrides — merge with base:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Caddy serves static frontend files directly and proxies API requests:
#   /api* → api:8000
#   /*    → static files (built by frontend-builder, mounted via volume)
#
# Frontend is built at compose build time via frontend-builder service.
# Set PUBLIC_APP_DOMAIN in .env (hostname clients use). Optional: CADDY_EMAIL for ACME account.
# Build-time API URL for the SPA defaults from VITE_PROD_API_URL (see .env.example).
#
# Do not set dev-only flags such as ALLOW_DEFAULT_HOTEL in production.

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
      - "${CADDY_HTTPS_PORT:-443}:443/udp"
    environment:
      PUBLIC_APP_DOMAIN: ${PUBLIC_APP_DOMAIN:-localhost}
      CADDY_EMAIL: ${CADDY_EMAIL:-internal@localhost}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - frontend
    restart: unless-stopped
    networks:
      - hotel-network

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=8000
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-hotel_pms_dev}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - JWT_SECRET=${JWT_SECRET:-change_me_for_production}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672}
      - SYNC_INTERVAL_MS=${SYNC_INTERVAL_MS:-60000}
      - SYNC_ENABLED=${SYNC_ENABLED:-true}
      - QLO_API_URL=${QLO_API_URL:-}
      - QLO_API_KEY=${QLO_API_KEY:-}
      - QLOAPPS_DEFAULT_CURRENCY=${QLOAPPS_DEFAULT_CURRENCY:-USD}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_PROD_API_URL:-https://localhost/api}

  worker-inbound:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["node", "dist/src/workers/qloapps_inbound_worker.js"]
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-hotel_pms_dev}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672}

  worker-outbound:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["node", "dist/src/workers/qloapps_outbound_worker.js"]
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-hotel_pms_dev}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672}

  worker-scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["node", "dist/src/workers/qloapps_sync_scheduler.js"]
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-hotel_pms_dev}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672}
      - SYNC_INTERVAL_MS=${SYNC_INTERVAL_MS:-60000}
      - SYNC_ENABLED=${SYNC_ENABLED:-true}



volumes:
  caddy_data:
  caddy_config:
